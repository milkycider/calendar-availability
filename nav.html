<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>空き状況カレンダー</title>
<style>
:root {
  --bg:      #f7f6f2;
  --surface: #ffffff;
  --border:  #e2e0d8;
  --text:    #2c2b27;
  --muted:   #9b9890;
  --ok-bg:   #e6f4ee;
  --ok-text: #1a6b40;
  --ng-bg:   #fdecea;
  --ng-text: #b53a2f;
  --off-bg:  #eef0f8;
  --past-bg: #f2f2f0;
  --sat:     #2a4fa0;
  --sun:     #a02a2a;
  --accent:  #3d5a99;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}
.wrap { max-width: 780px; margin: 0 auto; padding: 24px 16px 48px; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.header h1 { font-size: 22px; font-weight: 700; color: var(--accent); }
.nav { display: flex; align-items: center; gap: 12px; }
.nav-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: 50%;
  border: 1.5px solid var(--border); background: var(--surface);
  color: var(--text); font-size: 18px; cursor: pointer;
  transition: background 0.15s;
}
.nav-btn:hover { background: var(--off-bg); border-color: var(--accent); }
.nav-btn:disabled { opacity: 0.4; cursor: default; }
.nav-label { font-size: 17px; font-weight: 700; min-width: 110px; text-align: center; }
.legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; font-size: 12px; color: var(--muted); align-items: center; }
.legend-item { display: flex; align-items: center; gap: 5px; }
.badge-s { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 11px; font-weight: 700; }
.badge-ok { background: var(--ok-bg);  color: var(--ok-text); }
.badge-ng { background: var(--ng-bg);  color: var(--ng-text); }
.badge-na { background: var(--border); color: var(--muted); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.dow-header { text-align: center; font-size: 12px; font-weight: 700; padding: 6px 0; color: var(--muted); }
.dow-header.sat { color: var(--sat); }
.dow-header.sun { color: var(--sun); }
.day-cell {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 5px 7px; min-height: 88px;
  display: flex; flex-direction: column; gap: 4px;
}
.day-cell.empty   { background: transparent; border-color: transparent; }
.day-cell.is-off  { background: var(--off-bg); }
.day-cell.is-past { background: var(--past-bg); opacity: 0.45; }
.day-cell.is-today { border: 2px solid var(--accent); }
.day-num { font-size: 13px; font-weight: 700; line-height: 1; margin-bottom: 2px; color: var(--text); }
.day-cell.sat .day-num        { color: var(--sat); }
.day-cell.sun .day-num        { color: var(--sun); }
.day-cell.is-holiday .day-num { color: var(--sun); }
.slots { display: flex; flex-direction: column; gap: 3px; }
.slot { display: flex; align-items: center; gap: 3px; font-size: 10px; color: var(--muted); }
.slot-badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; font-weight: 700; min-width: 22px; text-align: center; }
.slot-badge.ok { background: var(--ok-bg); color: var(--ok-text); }
.slot-badge.ng { background: var(--ng-bg); color: var(--ng-text); }
.slot-badge.na { background: var(--border); color: var(--muted); }
.slot-label { white-space: nowrap; }
.skeleton {
  background: linear-gradient(90deg, var(--border) 25%, var(--past-bg) 50%, var(--border) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
  border-radius: 4px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.skel-num  { width: 18px; height: 13px; margin-bottom: 4px; }
.skel-slot { width: 100%; height: 10px; }
@media (max-width: 500px) {
  .day-cell { min-height: 72px; padding: 4px 3px 5px; }
  .slot-label { display: none; }
  .header h1 { font-size: 17px; }
  .nav-label { font-size: 14px; min-width: 84px; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>空き状況</h1>
    <div class="nav">
      <button class="nav-btn" id="prev-btn">&#8249;</button>
      <div class="nav-label" id="nav-label">…</div>
      <button class="nav-btn" id="next-btn">&#8250;</button>
    </div>
  </div>
  <div class="legend">
    <div class="legend-item"><span class="badge-s badge-ok">○</span>空き</div>
    <div class="legend-item"><span class="badge-s badge-ng">×</span>不可</div>
    <div class="legend-item"><span class="badge-s badge-na">—</span>該当なし</div>
    <div class="legend-item" style="margin-left:4px;">🌙 夜（21〜24時）&nbsp;／&nbsp;☀ 休日昼（〜19時）</div>
  </div>
  <div class="cal-grid" id="cal-grid">
    <div class="dow-header sun">日</div>
    <div class="dow-header">月</div>
    <div class="dow-header">火</div>
    <div class="dow-header">水</div>
    <div class="dow-header">木</div>
    <div class="dow-header">金</div>
    <div class="dow-header sat">土</div>
  </div>
</div>
<script>
var params = new URLSearchParams(location.search);
var now = new Date();
var YEAR  = parseInt(params.get('year'))  || now.getFullYear();
var MONTH = parseInt(params.get('month')) || (now.getMonth() + 1);
var DATA  = null;
var loading = false;
var today = new Date();

function makeSlot(icon, label, val) {
  var row   = document.createElement('div');
  row.className = 'slot';
  var badge = document.createElement('span');
  var lbl   = document.createElement('span');
  lbl.className = 'slot-label';
  lbl.textContent = icon + ' ' + label;
  if (val === null) {
    badge.className = 'slot-badge na';
    badge.textContent = '—';
  } else if (val === true) {
    badge.className = 'slot-badge ok';
    badge.textContent = '○';
  } else {
    badge.className = 'slot-badge ng';
    badge.textContent = '×';
  }
  row.appendChild(badge);
  row.appendChild(lbl);
  return row;
}

function renderSkeleton(y, m) {
  var grid = document.getElementById('cal-grid');
  while (grid.children.length > 7) grid.removeChild(grid.lastChild);
  var firstDow    = new Date(y, m - 1, 1).getDay();
  var daysInMonth = new Date(y, m, 0).getDate();
  for (var i = 0; i < firstDow; i++) {
    var blank = document.createElement('div');
    blank.className = 'day-cell empty';
    grid.appendChild(blank);
  }
  for (var d = 1; d <= daysInMonth; d++) {
    var cell = document.createElement('div');
    cell.className = 'day-cell';
    cell.innerHTML = '<div class="skeleton skel-num"></div>'
      + '<div class="slots">'
      + '<div class="skeleton skel-slot"></div>'
      + '<div class="skeleton skel-slot" style="margin-top:3px"></div>'
      + '</div>';
    grid.appendChild(cell);
  }
}

function renderCalendar() {
  document.getElementById('nav-label').textContent = YEAR + '年 ' + MONTH + '月';

  var grid = document.getElementById('cal-grid');
  while (grid.children.length > 7) grid.removeChild(grid.lastChild);

  var firstDow    = new Date(YEAR, MONTH - 1, 1).getDay();
  var daysInMonth = new Date(YEAR, MONTH, 0).getDate();

  for (var i = 0; i < firstDow; i++) {
    var blank = document.createElement('div');
    blank.className = 'day-cell empty';
    grid.appendChild(blank);
  }

  for (var d = 1; d <= daysInMonth; d++) {
    var info = DATA[String(d)];
    var cell = document.createElement('div');
    var cls  = ['day-cell'];
    if (info.isPast)    cls.push('is-past');
    if (info.isOff)     cls.push('is-off');
    if (info.isHoliday) cls.push('is-holiday');
    if (info.dow === 0) cls.push('sun');
    if (info.dow === 6) cls.push('sat');
    if (d === today.getDate() && MONTH === today.getMonth() + 1 && YEAR === today.getFullYear()) {
      cls.push('is-today');
    }
    cell.className = cls.join(' ');

    var dayNum = document.createElement('div');
    dayNum.className = 'day-num';
    dayNum.textContent = d;
    cell.appendChild(dayNum);

    if (!info.isPast && info.slots) {
      var slots = document.createElement('div');
      slots.className = 'slots';
      var s = info.slots;
      if (info.isOff) {
        slots.appendChild(makeSlot('☀', '〜19時', s.holidayDay));
      }
      var nightVal = info.isOff ? s.holidayNight : s.weekdayNight;
      slots.appendChild(makeSlot('🌙', '21〜24時', nightVal));
      cell.appendChild(slots);
    }
    grid.appendChild(cell);
  }
}

function setLoading(flag, targetY, targetM) {
  loading = flag;
  document.getElementById('prev-btn').disabled = flag;
  document.getElementById('next-btn').disabled = flag;
  if (flag) {
    document.getElementById('nav-label').textContent = targetY + '年 ' + targetM + '月';
    renderSkeleton(targetY, targetM);
  }
}

async function loadMonth(y, m) {
  setLoading(true, y, m);
  try {
    var res = await fetch('/api/calendar?year=' + y + '&month=' + m);
    var json = await res.json();
    if (json.error) throw new Error(json.error);
    DATA  = json.data;
    YEAR  = json.year;
    MONTH = json.month;
    renderCalendar();

    // URLも更新（履歴を汚さない）
    var newParams = new URLSearchParams(location.search);
    newParams.set('year', YEAR);
    newParams.set('month', MONTH);
    history.replaceState(null, '', location.pathname + '?' + newParams.toString());
  } catch (err) {
    alert('取得失敗: ' + err.message);
  } finally {
    setLoading(false);
  }
}

document.getElementById('prev-btn').addEventListener('click', function() {
  if (loading) return;
  var m = MONTH - 1, y = YEAR;
  if (m < 1) { m = 12; y--; }
  loadMonth(y, m);
});
document.getElementById('next-btn').addEventListener('click', function() {
  if (loading) return;
  var m = MONTH + 1, y = YEAR;
  if (m > 12) { m = 1; y++; }
  loadMonth(y, m);
});

loadMonth(YEAR, MONTH);
</script>
</body>
</html>
