<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>空き状況カレンダー</title>
<style>
:root {
  --bg:      #f7f6f2;
  --surface: #ffffff;
  --border:  #e2e0d8;
  --text:    #2c2b27;
  --muted:   #9b9890;
  --ok-bg:   #e6f4ee;
  --ok-text: #1a6b40;
  --ng-bg:   #fdecea;
  --ng-text: #b53a2f;
  --off-bg:  #eef0f8;
  --past-bg: #f2f2f0;
  --sat:     #2a4fa0;
  --sun:     #a02a2a;
  --accent:  #3d5a99;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}
.wrap { max-width: 780px; margin: 0 auto; padding: 24px 16px 48px; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.header h1 { font-size: 22px; font-weight: 700; color: var(--accent); }
.month-label { font-size: 17px; font-weight: 700; color: var(--text); }
.legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; font-size: 12px; color: var(--muted); align-items: center; }
.legend-item { display: flex; align-items: center; gap: 5px; }
.badge-s { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 11px; font-weight: 700; }
.badge-ok { background: var(--ok-bg);  color: var(--ok-text); }
.badge-ng { background: var(--ng-bg);  color: var(--ng-text); }
.badge-na { background: var(--border); color: var(--muted); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.dow-header { text-align: center; font-size: 12px; font-weight: 700; padding: 6px 0; color: var(--muted); }
.dow-header.sat { color: var(--sat); }
.dow-header.sun { color: var(--sun); }
.day-cell {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 5px 7px; min-height: 88px;
  display: flex; flex-direction: column; gap: 4px;
}
.day-cell.empty   { background: transparent; border-color: transparent; }
.day-cell.is-off  { background: var(--off-bg); }
.day-cell.is-past { background: var(--past-bg); opacity: 0.45; }
.day-cell.is-today { border: 2px solid var(--accent); }
.day-num { font-size: 13px; font-weight: 700; line-height: 1; margin-bottom: 2px; color: var(--text); }
.day-cell.sat .day-num        { color: var(--sat); }
.day-cell.sun .day-num        { color: var(--sun); }
.day-cell.is-holiday .day-num { color: var(--sun); }
.slots { display: flex; flex-direction: column; gap: 3px; }
.slot { display: flex; align-items: center; gap: 3px; font-size: 10px; color: var(--muted); }
.slot-badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; font-weight: 700; min-width: 22px; text-align: center; }
.slot-badge.ok { background: var(--ok-bg); color: var(--ok-text); }
.slot-badge.ng { background: var(--ng-bg); color: var(--ng-text); }
.slot-badge.na { background: var(--border); color: var(--muted); }
.slot-label { white-space: nowrap; }
.loading { text-align: center; padding: 60px 0; color: var(--muted); }
@media (max-width: 500px) {
  .day-cell { min-height: 72px; padding: 4px 3px 5px; }
  .slot-label { display: none; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>空き状況</h1>
    <div class="month-label" id="month-label"></div>
  </div>
  <div class="legend">
    <div class="legend-item"><span class="badge-s badge-ok">○</span>空き</div>
    <div class="legend-item"><span class="badge-s badge-ng">×</span>不可</div>
    <div class="legend-item"><span class="badge-s badge-na">—</span>該当なし</div>
    <div class="legend-item" style="margin-left:4px;">🌙 夜（21〜24時）&nbsp;／&nbsp;☀ 休日昼（〜19時）</div>
  </div>
  <div id="content" class="loading">読み込み中…</div>
</div>
<script>
function makeSlotHtml(icon, label, val) {
  var cls = val === null ? 'na' : (val ? 'ok' : 'ng');
  var txt = val === null ? '—' : (val ? '○' : '×');
  return '<div class="slot"><span class="slot-badge ' + cls + '">' + txt + '</span>'
    + '<span class="slot-label">' + icon + ' ' + label + '</span></div>';
}

function renderCalendarHtml(year, month, data) {
  var today = new Date();
  var firstDow = new Date(year, month - 1, 1).getDay();
  var daysInMonth = new Date(year, month, 0).getDate();

  var html = '<div class="cal-grid">';
  var headers = ['日','月','火','水','木','金','土'];
  var hcls = ['sun','','','','','','sat'];
  headers.forEach(function(h, i) {
    html += '<div class="dow-header ' + (hcls[i]||'') + '">' + h + '</div>';
  });

  for (var i = 0; i < firstDow; i++) html += '<div class="day-cell empty"></div>';

  for (var d = 1; d <= daysInMonth; d++) {
    var info = data[String(d)];
    var cls = ['day-cell'];
    if (info.isPast) cls.push('is-past');
    if (info.isOff) cls.push('is-off');
    if (info.isHoliday) cls.push('is-holiday');
    if (info.dow === 0) cls.push('sun');
    if (info.dow === 6) cls.push('sat');
    if (d === today.getDate() && month === today.getMonth()+1 && year === today.getFullYear()) cls.push('is-today');

    html += '<div class="' + cls.join(' ') + '"><div class="day-num">' + d + '</div>';
    if (!info.isPast && info.slots) {
      html += '<div class="slots">';
      if (info.isOff) html += makeSlotHtml('☀', '〜19時', info.slots.holidayDay);
      var nightVal = info.isOff ? info.slots.holidayNight : info.slots.weekdayNight;
      html += makeSlotHtml('🌙', '21〜24時', nightVal);
      html += '</div>';
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

async function load() {
  var params = new URLSearchParams(location.search);
  var year = params.get('year');
  var month = params.get('month');

  var apiUrl = '/api/calendar?';
  if (year) apiUrl += 'year=' + year + '&';
  if (month) apiUrl += 'month=' + month;

  try {
    var res = await fetch(apiUrl);
    var json = await res.json();
    if (json.error) throw new Error(json.error);

    document.getElementById('month-label').textContent = json.year + '年 ' + json.month + '月';
    document.getElementById('content').className = '';
    document.getElementById('content').innerHTML = renderCalendarHtml(json.year, json.month, json.data);
  } catch (err) {
    document.getElementById('content').textContent = '読み込みエラー: ' + err.message;
  }
}

load();
</script>
</body>
</html>
